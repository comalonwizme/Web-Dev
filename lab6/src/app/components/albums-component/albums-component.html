<div class="albums-page">
  <h1>Travel Memories</h1>
  <p>Browse all travel collections</p>

  <div *ngIf="loading" class="loading">
    Loading albums...
  </div>

  <div *ngIf="errorMessage" class="error">
    {{ errorMessage }}
  </div>

  <div *ngIf="!loading && !errorMessage && albums.length === 0" class="empty">
    No albums found.
  </div>

  <ul *ngIf="!loading && albums.length > 0" class="albums-list">
    <li *ngFor="let album of albums" class="album-card">
      <div class="album-info">
        <h3>{{ album.id }}. {{ album.title }}</h3>
      </div>

      <div class="album-actions">
        <a [routerLink]="['/albums', album.id]" class="details-btn">
          Details
        </a>

        <button (click)="deleteAlbum(album.id)" class="delete-btn">
          Delete
        </button>
      </div>
    </li>
  </ul>
</div>
